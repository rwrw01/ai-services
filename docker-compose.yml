networks:
  ai-net:
    name: ai-net
  app_net:
    name: app_net
    driver: bridge

services:
  stt:
    build: ./stt
    ports:
      - "8001:8001"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    profiles: ["stt"]     # Standaard uit — wordt vervangen door gpu-queue + Qwen3-ASR
    volumes:
      - stt-cache:/app/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ai-net

  tts:
    build: ./tts
    ports:
      - "8002:8002"
    volumes:
      - tts-cache:/data/tts-cache
      - tts-models:/app/.cache
    environment:
      - TTS_PIPER_ENABLED=true
      - TTS_PARKIET_ENABLED=true
      - TTS_DEFAULT_ENGINE=piper
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - path: .env
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-net
      - app_net

  gpu-queue:
    build: ./gpu-queue
    ports:
      - "8003:8003"
    volumes:
      - gpu-queue-models:/root/.cache/huggingface
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - SUPERVISOR_URL=http://supervisor:8100
      - LOG_LEVEL=info
      - CUDA_VISIBLE_DEVICES=0
    env_file:
      - path: .env
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ai-net
      - app_net

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=http://n8n:5678/
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-net

  whatsapp-web:
    build: ./whatsapp-web
    ports:
      - "3001:3001"
    volumes:
      - whatsapp-session:/data/session
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-net

volumes:
  stt-cache:
  tts-cache:
  tts-models:
  ollama-data:
  gpu-queue-models:
  n8n-data:
  whatsapp-session:
